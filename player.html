<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Player Profile — Vakundo FC</title>
  <link rel="stylesheet" href="./styles.css" />
  <link rel="stylesheet" href="./player.css" />
</head>
<body>
  <div class="page-shell">
    <header class="site-header">
      <a class="brand" href="./index.html">
        <img src="./assets/vakundo-logo.png" alt="Vakundo FC crest" />
        <span>
          <small>Vakundo FC</small>
          <strong>Official Club Site</strong>
        </span>
      </a>
      <nav class="top-nav" aria-label="Primary">
        <a href="./index.html#squad">Squad</a>
        <a href="./index.html#lineup">Lineup</a>
        <a href="./index.html#energy">Club Energy</a>
      </nav>
    </header>

    <main class="player-page">
      <a class="back-link" href="./index.html#squad">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M13 16l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Back to Squad
      </a>

      <section class="player-hero">
        <div class="player-hero-bg">
          <div class="player-glow player-glow-1"></div>
          <div class="player-glow player-glow-2"></div>
          <div class="player-glow player-glow-3"></div>
          <div class="particle-field" id="particle-field"></div>
        </div>

        <div class="player-hero-content">
          <div class="player-card-wrapper">
            <div class="player-card" id="player-card">
              <div class="player-card-shine"></div>
              <div class="player-card-top">
                <span class="player-ovr" id="player-ovr">88</span>
                <span class="player-pos-badge" id="player-pos-badge">GK</span>
                <div class="player-club-badge">
                  <img src="./assets/vakundo-logo.png" alt="Club" />
                </div>
              </div>
              <div class="player-card-art" id="player-card-art"></div>
              <div class="player-card-name" id="player-card-name">Player</div>
              <div class="player-card-stats" id="player-card-stats"></div>
            </div>
          </div>

          <div class="player-intro">
            <div class="player-number-bg" id="player-number-bg">#0</div>
            <p class="player-eyebrow">
              <span class="player-pos-pill" id="player-position-pill">GK</span>
              <span class="player-num-pill" id="player-number-pill">#1</span>
            </p>
            <h1 class="player-title" id="player-title">Player Name</h1>
            <p class="player-tagline" id="player-tagline">Role goes here</p>
            <p class="player-bio-text" id="player-bio-text">Bio goes here</p>
          </div>
        </div>
      </section>

      <section class="player-tabs-section">
        <div class="tabs-bar" id="tabs-bar">
          <button class="tab-btn is-active" data-tab="stats">Stats</button>
          <button class="tab-btn" data-tab="traits">Traits</button>
          <button class="tab-btn" data-tab="moments">Moments</button>
          <div class="tab-indicator" id="tab-indicator"></div>
        </div>

        <div class="tab-panels">
          <div class="tab-panel is-visible" id="panel-stats">
            <div class="stats-grid">
              <div class="stat-card stat-card-radar">
                <h3>Ability Radar</h3>
                <div class="radar-wrap">
                  <canvas id="radar-canvas" width="320" height="320"></canvas>
                </div>
              </div>
              <div class="stat-card stat-card-bars">
                <h3>Attributes</h3>
                <div id="stat-bars" class="stat-bars"></div>
              </div>
            </div>
          </div>

          <div class="tab-panel" id="panel-traits">
            <div class="traits-grid" id="traits-grid"></div>
          </div>

          <div class="tab-panel" id="panel-moments">
            <div class="moments-timeline" id="moments-timeline"></div>
          </div>
        </div>
      </section>

      <section class="player-nav-section">
        <h3>Other Players</h3>
        <div class="player-nav-strip" id="player-nav-strip"></div>
      </section>
    </main>
  </div>

  <script src="./player.js"></script>
</body>
</html>
